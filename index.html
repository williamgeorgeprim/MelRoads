<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Debug</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:100vw; height:100vh; overflow:hidden; font-family:monospace; }
    #map { width:100%; height:100%; }
    #debug {
      position:absolute; top:10px; left:10px; z-index:999;
      background:white; padding:12px; border-radius:8px;
      max-width:90vw; max-height:80vh; overflow-y:auto;
      font-size:11px; box-shadow:0 2px 12px rgba(0,0,0,0.2);
      white-space:pre-wrap;
    }
  </style>
</head>
<body>
  <div id="map"></div>
  <div id="debug">Loading map — click anywhere on a road after the map loads…</div>
  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [144.9631, -37.8136],
      zoom: 13
    });

    map.on('load', () => {
      document.getElementById('debug').textContent =
        'Map loaded! Now click directly on a road name or road line.';

      // On ANY click, query ALL features at that point across ALL layers
      map.on('click', (e) => {
        const features = map.queryRenderedFeatures(e.point);

        if (features.length === 0) {
          document.getElementById('debug').textContent = 'No features found here. Try clicking ON a road line.';
          return;
        }

        // Show every feature found — layer id, source-layer, and name if any
        const lines = features.map(f =>
          `layer: ${f.layer.id}\n  source-layer: ${f.sourceLayer || '?'}\n  name: ${f.properties.name || f.properties.ref || '—'}\n  type: ${f.geometry.type}`
        );
        document.getElementById('debug').textContent =
          `Clicked — found ${features.length} feature(s):\n\n` + lines.join('\n\n');
      });
    });

    map.on('error', (e) => {
      document.getElementById('debug').textContent = 'MAP ERROR: ' + e.error.message;
    });
  </script>
</body>
</html>
