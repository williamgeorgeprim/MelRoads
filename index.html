<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melbourne Streets</title>

  <!-- MapLibre GL JS — the map engine -->
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <style>
    /* Make the map fill the entire screen */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; }
    #map { width: 100%; height: 100%; }
  </style>
</head>
<body>

  <div id="map"></div>

  <script>
    const map = new maplibregl.Map({
      container: 'map',            // the div above
      style: 'https://tiles.openfreemap.org/styles/positron', // clean, free map tiles — no key needed
      center: [144.9631, -37.8136], // Melbourne CBD [lng, lat]
      zoom: 11
    });

    // Zoom controls bottom-right
    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');
  </script>

</body>
</html>
