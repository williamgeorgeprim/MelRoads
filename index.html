<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Melbourne Streets</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 100vw; height: 100vh; overflow: hidden; font-family: sans-serif; }
    #map { width: 100%; height: 100%; }

    #popup {
      position: absolute;
      background: white;
      border-radius: 12px;
      padding: 12px 16px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
      display: none;
      min-width: 160px;
      max-width: 240px;
    }
    #popup-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 8px;
    }
    #popup-close {
      font-size: 0.75rem;
      color: #999;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0;
    }
  </style>
</head>
<body>

  <div id="map"></div>
  <div id="popup">
    <div id="popup-name">Road name</div>
    <button id="popup-close" onclick="closePopup()">dismiss</button>
  </div>

  <script>
    const map = new maplibregl.Map({
      container: 'map',
      style: 'https://tiles.openfreemap.org/styles/positron',
      center: [144.9631, -37.8136],
      zoom: 11
    });
    map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

    map.on('load', () => {

      // Instead of guessing layer names, we add our OWN invisible clickable
      // layer directly on the transportation_name source — the one that has road names.
      // This works regardless of what the style calls its layers.
      map.addLayer({
        id: 'roads-clickable',
        type: 'line',
        source: 'openmaptiles',
        'source-layer': 'transportation',   // the geometry source layer
        filter: ['has', 'name'],             // only roads that actually have a name
        paint: {
          'line-color': 'rgba(0,0,0,0)',     // fully transparent — invisible
          'line-width': 12                   // but wide, so it's easy to tap
        }
      });

      // Hover cursor
      map.on('mouseenter', 'roads-clickable', () => {
        map.getCanvas().style.cursor = 'pointer';
      });
      map.on('mouseleave', 'roads-clickable', () => {
        map.getCanvas().style.cursor = '';
      });

      // Click a road
      map.on('click', 'roads-clickable', (e) => {
        const props = e.features[0].properties;
        const name = props.name || props.name_en || props.ref || 'Unnamed road';
        showPopup(name, e.point);
        e.originalEvent.stopPropagation();
      });

      // Click anywhere else → close
      map.on('click', () => closePopup());
    });

    function showPopup(name, point) {
      const popup = document.getElementById('popup');
      document.getElementById('popup-name').textContent = name;
      popup.style.left = (point.x + 12) + 'px';
      popup.style.top  = (point.y - 20) + 'px';
      popup.style.display = 'block';

      // Flip left if too close to right edge
      const rect = popup.getBoundingClientRect();
      if (rect.right > window.innerWidth - 8) {
        popup.style.left = (point.x - rect.width - 12) + 'px';
      }
    }

    function closePopup() {
      document.getElementById('popup').style.display = 'none';
    }
  </script>

</body>
</html>
